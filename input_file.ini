############################################################
##                                                        ##
## PySeqRNA run configuration                             ##
##                                                        ##
## Run with: pyseqrna -c input_file.ini                   ##
## CLI flags passed after -c override values in this file. ##
##                                                        ##
############################################################

[General]
# Required inputs. Paths can be absolute or relative to the directory
# where you run the pyseqrna command.
input_file = ./srp010938_full/input_Sample_PE.txt
samples_path = ./srp010938_full
reference_genome = ./Arabidopsis_thaliana.TAIR10.dna.toplevel.fa
feature_file = ./Arabidopsis_thaliana.TAIR10.58.gff3

# Output and run behavior.
outdir = ./pyseqrna_srp010938_full_run
dryrun = False
force = False
resume_policy = skip
paired = True

[Species]
# Use --organism to list supported functional-annotation species.
source = ENSEMBL
species = athaliana
organism_type = plants

[Quality]
# Quality control and trimming.
skip_quality = False
quality_tool = fastqc
quality_trim = True
skip_trim = False
trimming_tool = trim_galore

[Alignment]
skip_alignment = False

# HISAT2 is fast and works well for standard unique-count RNA-seq.
# If run_multimapped_groups = True below, STAR is recommended because
# it reports NH tags consistently for multi-mapping RNA-seq reads.
alignment_tool = star

# Alignment statistics run after BAM preparation. "auto" reads aligner logs
# when complete and falls back to BAM-based counting for validation/recovery.
alignment_stats = True
alignment_stats_source = auto

[Quantification]
skip_quantification = False
quant_method = genomic_overlaps

# Optional multimapped gene-group analysis. This is disabled by default
# because standard gene-level counts are usually enough for routine runs.
# Enable it when you want additional counts for genes that share ambiguous
# or multi-mapping read support.
run_multimapped_groups = True

# Keep only MMG rows with at least mmg_min_count reads in at least
# mmg_percent_sample fraction of samples.
mmg_min_count = 100
mmg_percent_sample = 0.5
mmg_feature = gene

# Overlap behavior for assigning an alignment to genes in MMG analysis.
# mmg_min_overlap is the minimum number of overlapping aligned bases.
# mmg_fraction_overlap is the minimum fraction of aligned read bases that
# must overlap a gene; 0.0 disables the fraction filter.
mmg_min_overlap = 1
mmg_fraction_overlap = 0.0

# Set these to True to disable the corresponding MMG behaviors.
mmg_no_ambiguous_unique = False
mmg_no_collapse_contained = False

[Normalization]
skip_normalization = False
normalization_method = rpkm
skip_normalization_plots = False

[Clustering]
# Sample similarity clustering runs after normalization.
run_clustering = True
cluster_target = samples
cluster_method = hierarchical
cluster_count = 6
cluster_metric = euclidean
cluster_linkage = average
cluster_top_variable = 1000
cluster_scale = row
cluster_no_log = False
cluster_no_heatmap = False
cluster_cmap = vlag

[Coexpression]
# Gene co-expression analysis runs after normalization.
run_coexpression = True
coexpression_tool = pycoexpression

# Native PyCoexpression settings are loaded from pyseqrna/param/coexpression.ini by default.
# Uncomment only when a run needs to override the packaged PyCoexpression defaults.
# coexpression_tightness = 1.0
# coexpression_k_values = 4
# coexpression_outlier = 3.0
# coexpression_cluster_size = 11
# coexpression_replicates = False
# coexpression_preprocessing = False

[DifferentialExpression]
skip_diffexp = False
diffexp_tool = pydiffexpress
diffexp_normalization = median_ratio
diffexp_abundance = base_mean
diffexp_dispersion = map
diffexp_test = wald
fdr_threshold = 0.05
fold_threshold = 2.0
pvalue_threshold = 0.05
add_gene_names = True
subset = False

[Visualization]
# Main visualization switches. PCA/t-SNE use normalized counts; volcano,
# MA, heatmap, Venn, and UpSet use differential-expression outputs.
pca_plot = True
tsne_plot = True
volcano_plot = True
ma_plot = True
deg_heatmap = True
heatmap_top_genes = 50

# Venn and UpSet plots use 4.Differential_Expression/Filtered_DEGs.xlsx.
# If venn_comparisons is empty, PySeqRNA chunks all comparisons into
# Venn groups of up to four comparisons and also writes an UpSet-style
# intersection plot.
venn = True
upset = True
venn_comparisons =
venn_label = updown

[FunctionalAnnotation]
skip_functional_annotation = False
gene_ontology = True
kegg_pathway = True
go_pvalue_threshold = 0.05
kegg_pvalue_threshold = 0.05

[Report]
skip_report = False
report_formats = html,md,json
report_title = PySeqRNA Analysis Report

[Computational]
threads = 16
memory = 64
local_jobs = 1
resume = all

[SLURM]
slurm = True
slurm_partition = compute
slurm_account =
slurm_time = 72:00:00
slurm_email =
slurm_qos =

# Sample-level SLURM arrays. Set cpus/memory to 0 to use PySeqRNA's
# stage-aware defaults: FastQC 2 CPU/8G, trimming 4 CPU/16G,
# HISAT2/Bowtie2 8 CPU/32G, STAR 8 CPU/64G.
# Explicit values below override all sample-array stages.
slurm_array_max_parallel = 10
slurm_cpus_per_task = 8
slurm_memory_per_task = 64
slurm_wait_timeout_hours = 72

[Configuration]
config_file =
param_dir =

