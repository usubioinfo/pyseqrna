## Trimmomatic SE: Single-end adapter trimming and quality filtering
## Author: Naveen Duhan
## Version: 0.39
## Description: Configuration for Trimmomatic single-end read processing
##
## Trimmomatic SE is specifically configured for single-end reads, with
## options optimized for processing individual reads without pairing
## considerations.

[trimmomaticSE]
# Number of threads for parallel processing
# Higher values speed up processing but use more CPU resources
threads = -threads 5

# Quality score encoding (phred33 is standard for modern sequencers)
# phred33: ASCII+33 encoding (Illumina 1.8+ and Sanger)
Phred_Score = -phred33

# Adapter clipping for single-end reads: ILLUMINACLIP:adapter_file:seed_mismatches:palindrome_clip_threshold:simple_clip_threshold
# TruSeq3-SE contains single-end adapter sequences
# Format: ILLUMINACLIP:<adapter file>:<seed mismatches>:<palindrome clip threshold>:<simple clip threshold>
ILLUMINACLIP = ILLUMINACLIP:TruSeq3-SE:2:30:10

# Remove low quality bases from the beginning (quality < 3)
# Helps remove low quality or N bases at read start
start = LEADING:3

# Remove low quality bases from the end (quality < 3)
# Helps remove low quality bases that often occur at read ends
end = TRAILING:3

# Sliding window trimming: scan with 4-base window, cut when average quality < 15
# More aggressive quality filtering than simple LEADING/TRAILING
window = SLIDINGWINDOW:4:15

# Minimum read length after trimming (shorter reads discarded)
# Removes reads that would be too short to be informative
minLength = MINLEN:36

# Additional single-end specific options (uncomment to use):
# crop = CROP:250              # Cut reads to specified length from start
# headcrop = HEADCROP:10       # Cut specified number of bases from start
# maxinfo = MAXINFO:40:0.8     # Adaptive quality trimming
# avgqual = AVGQUAL:20         # Filter out reads with average quality below threshold