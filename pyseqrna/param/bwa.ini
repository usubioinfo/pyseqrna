## BWA: Burrows-Wheeler Aligner for genomic alignment
## Author: Naveen Duhan
## Type NA if you don't want to use any option
## You can add more option from a program with <key = option value #comment>

[index]
# Index directory (created in results directory)
index_dir = bwa_index
# Base name for index files
basename = genome
# Algorithm for index construction (bwtsw for large genomes)
algorithm = -a bwtsw

[alignment]
# Index directory for alignment
index_dir = bwa_index
# Reference genome basename
reference = genome
# Number of threads for alignment
threads = -t 20
# Minimum seed length
min_seed = -k 19
# Band width for banded alignment
bandwidth = -w 100
# Gap open penalty
gap_open = -O 6
# Gap extension penalty
gap_extend = -E 1
# Mismatch penalty
mismatch = -M 4
# Output all alignments
output_all = -a

# Additional commonly used options (uncomment to use):
# min_score = -T 30          # Minimum score to output
# max_insert = -I 500        # Maximum insert size for paired-end
# smart_pairing = -P         # Smart pairing (ignore in2.fq)
# mark_secondary = -M        # Mark shorter split hits as secondary