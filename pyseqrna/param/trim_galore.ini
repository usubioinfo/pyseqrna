## Trim Galore: Adapter and quality trimming tool
## Author: Naveen Duhan
## Version: 0.6.x
## Description: Configuration for Trim Galore adapter and quality trimming tool
##
## Trim Galore is a wrapper around Cutadapt and FastQC to consistently apply
## adapter and quality trimming to FastQ files, with extra functionality for
## RRBS data and automatic adapter detection.

[trim_galore]
# Output directory will be set by the module to: pySeqRNA_results/1.Quality_and_trimming/trimgalore_results/
# outdir = -o trim_galore_results

# Number of cores for parallel processing (4 cores per file)
# Higher values speed up processing but use more CPU resources
threads = --cores 4

# Quality threshold for trimming low-quality ends
# Phred score below this will be trimmed from 3' end
# Higher values = more aggressive quality trimming
quality = -q 20

# Quality score encoding (phred33 is standard for most modern sequencers)
# phred33: ASCII+33 encoding (Illumina 1.8+ and Sanger)
qscore = --phred33

# Compress output files with gzip
# Reduces file size but requires decompression for some downstream tools
gzip = --gzip

# Additional commonly used options (uncomment to use):
# length = --length 30       # Minimum read length after trimming
# adapter = -a AGATCGGAAG    # Adapter sequence (auto-detected if not specified)
# stringency = --stringency 3 # Overlap length for adapter detection
# error_rate = -e 0.1        # Maximum allowed error rate for adapter matching
# clip_R1 = --clip_R1 5      # Remove N bp from 5' end of read 1
# clip_R2 = --clip_R2 5      # Remove N bp from 5' end of read 2 (paired-end only)
# three_prime_clip_R1 = --three_prime_clip_R1 5  # Remove N bp from 3' end of read 1
# three_prime_clip_R2 = --three_prime_clip_R2 5  # Remove N bp from 3' end of read 2
