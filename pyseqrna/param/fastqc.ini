## FastQC: Quality control tool for high throughput sequence data
## Author: Naveen Duhan
## Version: 0.12.x
## Description: Configuration for FastQC quality control tool
##
## FastQC provides quality control checks on raw sequence data coming from
## high throughput sequencing pipelines. It provides a modular set of analyses
## which you can use to give a quick impression of whether your data has any problems.

[fastqc]
# Number of threads for parallel processing
# Higher values speed up analysis but use more CPU resources
threads = -t 30

# Suppress all progress messages on stdout (quiet mode)
# Useful for automated pipelines to reduce log output
quiet = -q

# Do not uncompress the output file after creating it
# Leaves .zip files instead of extracting HTML reports
zip_out = --noextract

# Additional commonly used options (uncomment to use):
# memory = --memory 512      # Memory limit in MB per thread
# format = --format fastq    # Input file format (auto-detected if not specified)
# outdir = -o output_dir     # Output directory (set by pipeline)
# adapters = --adapters file.txt  # Custom adapter file for overrepresentation analysis
# contaminants = --contaminants file.txt  # Custom contaminant list
# kmers = -k 7               # Length of Kmer for overrepresentation analysis