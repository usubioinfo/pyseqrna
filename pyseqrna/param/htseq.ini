## HTSeq-count: Gene expression quantification tool
## Author: Naveen Duhan
## Version: 2.0.x
## Description: Configuration for HTSeq-count quantification tool
##
## HTSeq-count is a Python package that provides infrastructure to process
## high-throughput sequencing data. It implements a method to count reads
## that overlap genomic features, such as exons or genes.

[htseq-count]
# Attribute to use as feature ID
# For GTF files: use 'gene_id' or 'transcript_id'
# For GFF files: use 'ID' or 'Parent'
attribute = -i ID

# Input file format (bam, sam)
# BAM is the compressed binary version of SAM
format = -f bam

# Feature type to count (exon, gene, transcript, CDS, etc.)
# Most common: 'exon' for gene-level quantification
feature = -t gene

# Overlap resolution mode for reads hitting multiple features
# union: count if overlaps any exon of the gene
# intersection-strict: count only if completely within exons
# intersection-nonempty: count if any overlap with exons
mode = -m union

# Additional commonly used options (uncomment to use):
# strandedness = -s no       # yes, no, reverse (strand-specific protocols)
# min_quality = -a 10        # Minimum alignment quality
# nonunique = --nonunique none  # How to handle non-uniquely aligned reads
# secondary = --secondary-alignments ignore  # How to handle secondary alignments
# supplementary = --supplementary-alignments ignore  # How to handle supplementary alignments