## STAR: Spliced Transcripts Alignment to a Reference
## Author: Naveen Duhan
## Version: 2.7.x
## Description: Configuration for STAR RNA-seq aligner
##
## STAR is an ultrafast universal RNA-seq aligner that can align reads
## to a reference genome with or without gene annotations.
## This config file contains parameters for both index building and alignment.

[index]
# Directory where the STAR index will be stored
index_dir = --genomeDir star_index

# Number of threads for parallel processing during indexing
# Higher values speed up indexing but require more memory
threads = --runThreadN 50

# Specify that we're generating a genome index
mode = --runMode genomeGenerate

# Tag for exon parent transcript in GTF file (usually 'transcript_id')
# Set to NA if not using GTF annotations
#Parent = --sjdbGTFtagExonParentTranscript NA

# Length of genomic sequence around annotated junctions
# Typically read length - 1 (set to NA for auto-detection)
#Overhang = --sjdbOverhang NA

# Maximum RAM usage for index generation (bytes)
# 16GB shown here; adjust based on available memory
memory = --limitGenomeGenerateRAM 16000000000

# Length of SA pre-indexing string
# For small genomes (<2GB), use smaller values (8-10)
genomeSAindexNbases = --genomeSAindexNbases 8

[alignment]
# Directory containing the STAR index
index_dir = --genomeDir star_index

# Number of threads for parallel processing during alignment
# Higher values speed up alignment but require more memory
threads = --runThreadN 40

# Command to handle gzipped input files
zipped_file= --readFilesCommand zcat

# Output format specification
# BAM Unsorted = uncompressed BAM format without sorting
output_type = --outSAMtype BAM Unsorted

# Include unmapped reads in the output BAM file
output_unmapped = --outSAMunmapped Within

# Standard SAM attributes to include in output
# Includes alignment score, edit distance, etc.
output_attributes = --outSAMattributes Standard
