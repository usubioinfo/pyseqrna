## Trimmomatic: Adapter trimming and quality filtering tool
## Author: Naveen Duhan
## Version: 0.39
## Description: Configuration for Trimmomatic quality and adapter trimming tool
##
## Trimmomatic is a flexible read trimming tool for Illumina NGS data that can
## be used to trim adapters and filter reads based on quality and length.
## It supports both single-end and paired-end data processing.

[trimmomatic]
# Output directory will be set by the module to: pySeqRNA_results/1.Quality_and_trimming/trimmomatic_results/
# outdir = trimmomatic_results

# Number of threads for parallel processing
# Higher values speed up processing but use more CPU resources
threads = -threads 5

# Quality score encoding (phred33 is standard for modern sequencers)
# phred33: ASCII+33 encoding (Illumina 1.8+ and Sanger)
Phred_Score = -phred33

# Adapter clipping: ILLUMINACLIP:adapter_file:seed_mismatches:palindrome_clip_threshold:simple_clip_threshold
# TruSeq3-SE: Single-end adapter sequences, 2:30:10 are default stringency settings
# seed_mismatches: Max mismatches in seed alignment (2)
# palindrome_clip_threshold: Score threshold for palindrome mode (30)
# simple_clip_threshold: Score threshold for simple mode (10)
ILLUMINACLIP = ILLUMINACLIP:TruSeq3-SE:2:30:10

# Remove low quality bases from the beginning of reads
# LEADING:3 removes bases with quality below 3 from start
# Helps remove low quality or N bases at read start
start = LEADING:3

# Remove low quality bases from the end of reads
# TRAILING:3 removes bases with quality below 3 from end
# Helps remove low quality bases that often occur at read ends
end = TRAILING:3

# Sliding window trimming: SLIDINGWINDOW:windowSize:requiredQuality
# Scans with 4-base window, cuts when average quality drops below 15
# More aggressive quality filtering than simple LEADING/TRAILING
window = SLIDINGWINDOW:4:15

# Minimum read length after trimming (shorter reads are discarded)
# Removes reads that would be too short to be informative
minLength = MINLEN:36

# Additional commonly used options (uncomment to use):
# crop = CROP:250              # Cut reads to specified length from start
# headcrop = HEADCROP:10       # Cut specified number of bases from start
# maxinfo = MAXINFO:40:0.8     # Adaptive quality trimming based on maximizing read length vs. error rate
# avgqual = AVGQUAL:20         # Filter out reads with average quality below threshold