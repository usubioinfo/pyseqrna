[coexpression]
# Outlier correlation threshold scaling factor (default: 1.0, which resolves to correlation >= 0.7)
tightness = 1.0

# Number of clusters K. Can be a single integer or a space/comma-separated range of integers (e.g. 3 4 5 6)
k_values = 4

# Z-score distance outlier threshold in standard deviations (default: 3.0)
outlier = 3.0

# Minimum cluster size (clusters with fewer genes after outlier filtering are discarded)
cluster_size = 11

# Whether to collapse replicate columns by averaging them before Z-score normalization
replicates = False

# Whether to apply log2(expression + 1) transform before Z-score normalization
preprocessing = False
