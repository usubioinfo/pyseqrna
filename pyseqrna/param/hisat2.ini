## HISAT2: Graph-based alignment of next generation sequencing reads
## Author: Naveen Duhan
## Version: 2.2.x
## Description: Configuration for HISAT2 RNA-seq aligner
##
## HISAT2 is a fast and sensitive alignment program for mapping
## next-generation sequencing reads against a reference genome.
## It is particularly well-suited for RNA-seq alignment due to its
## ability to handle spliced alignments efficiently.

[index]
# Directory where the HISAT2 index will be stored
# This will be created in the results directory
index_dir = hisat2_index

# Base name for the index files
# All index files will start with this prefix
basename = genome

# Number of threads for parallel processing during indexing
# Higher values speed up indexing but require more memory
threads = -p 50

[alignment]
# Directory containing the HISAT2 index
# Should match the index_dir from the index section
index_dir = hisat2_index

# Base name of the reference genome index
# Should match the basename from the index section
reference = genome

# Number of threads for parallel processing during alignment
# Higher values speed up alignment but require more memory
threads = --threads 120

# Report all alignments per read (up to alignment limit)
alignment = -a

# Minimum intron length allowed in alignments
# Default is 20, but 30 is better for most eukaryotes
minIntronLength = --min-intronlen 30

# Maximum intron length allowed in alignments
# 30000 is appropriate for most model organisms
maxIntronLength = --max-intronlen 30000