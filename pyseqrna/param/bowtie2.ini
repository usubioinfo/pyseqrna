## Bowtie2: Fast and memory-efficient alignment tool
## Author: Naveen Duhan
## Type NA if you don't want to use any option
## You can add more option from a program with <key = option value #comment>

[index]
# Index directory (created in results directory)
index_dir = bowtie2_index
# Base name for index files
basename = genome
# Number of threads for index building
threads = --threads 50

[alignment]
# Index directory for alignment (same as above)
index_dir = bowtie2_index
# Reference genome basename (same as basename in index)
reference = genome
# Number of cores for alignment
cores = -p 20
# Report all alignments per read (up to alignment limit)
alignment = -a

# Additional commonly used options (uncomment to use):
# sensitivity = --very-sensitive    # Preset for high sensitivity
# local_mode = --local              # Local alignment mode
# min_score = --score-min L,0,-0.6  # Minimum alignment score
# max_insert = -X 500               # Maximum insert size for paired-end
# no_mixed = --no-mixed             # Suppress unpaired alignments for paired reads
