## GenomicOverlaps: Novel genomic overlaps quantification module
## Author: Naveen Duhan
## Version: 1.0.0
## Description: Configuration for genomic overlaps quantification algorithms
##
## This config file controls the behavior of the GenomicOverlapsQuantifier module,
## which implements sophisticated RNA-seq read counting with various filtering options.

[genomic_overlaps]
# Filter strategy for read counting:
# - 'none': Count all reads that overlap features (no filtering)
# - 'strict': Apply all filters (mapping quality, multi-mapping, strand)
filter_strategy = none

# Minimum mapping quality score required for a read to be counted
# Higher values reduce noise from ambiguous alignments (0-255, MAPQ score)
min_mapping_quality = 10

# Whether to ignore strand information when counting reads
# false = strand-specific counting (read must match feature strand)
# true = ignore strand (count reads regardless of strand)
ignore_strand = false

# Whether to count multi-mapped reads (reads mapping to multiple locations)
# false = only count uniquely mapped reads
# true = include multi-mapped reads in counts
count_multi_mapping = false

# Number of samples to quantify concurrently:
# - auto: use a safe cap based on thread count, max 8 samples at a time
# - 1: sequential processing
# - N: process up to N samples at the same time
parallel_samples = auto

# Threads to use when creating BAM indexes. Keep this low when parallel_samples
# is greater than 1 to avoid oversubscribing CPUs and filesystem I/O.
bam_index_threads = 1
