## featureCount: Gene expression quantification tool
## Author: Naveen Duhan
## Version: 2.0.x
## Description: Configuration for Subread's featureCounts quantification tool
##
## featureCounts is a highly efficient general-purpose read summarization program
## that counts mapped reads for genomic features such as genes, exons, promoters, etc.
## It can be used to count both RNA-seq and genomic DNA-seq reads.

[featureCount]
# Number of threads for parallel processing
# Higher values speed up counting but use more CPU resources
threads = -T 5

# Attribute to use for feature grouping
# For GTF files: use 'gene_id' or 'transcript_id'
# For GFF files: use 'ID' or 'Parent'
attribute = -g ID

# Feature type to quantify (exon, gene, transcript, CDS, etc.)
# Most common: 'exon' for gene-level quantification
feature = -t gene

# Additional commonly used options (uncomment to use):
# strandedness = -s 0        # 0=unstranded, 1=stranded, 2=reverse-stranded
# min_overlap = -O 1         # Minimum overlap between read and feature
# multi_mapping = -M         # Count multi-mapping reads
# primary_only = -P          # Count only primary alignments
# paired_end = -p            # For paired-end data (auto-detected by pipeline)
# frac_overlap = -f 0.0      # Minimum fraction of overlap required
# count_by_read = --countReadPairs  # Count read pairs instead of reads


