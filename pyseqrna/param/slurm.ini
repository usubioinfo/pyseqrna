## SLURM: Workload manager for HPC cluster job submission
## Author: Naveen Duhan
## Version: 1.0.0
## Description: Configuration for SLURM job submission parameters
##
## SLURM (Simple Linux Utility for Resource Management) is a workload manager
## for high-performance computing clusters. This configuration file sets up
## the parameters used when submitting jobs to a SLURM-managed cluster.

[slurm]
# SLURM partition/queue to submit jobs to
# Specify the partition where jobs will be submitted
# Common values: compute, gpu, bigmem, etc.
partition = compute

# Number of CPU cores to request per job
# Higher values allow more parallelism but may increase queue time
cpus = 20

# Memory allocation in GB per job
# Ensure this is sufficient for your analysis to avoid out-of-memory errors
memory = 16

# Number of tasks (usually 1 for single-node jobs)
# For MPI jobs, increase this to run multiple processes
ntasks = 1

# Additional commonly used SLURM options (uncomment to use):
# time = 24:00:00              # Maximum wall time (hours:minutes:seconds)
# nodes = 1                    # Number of nodes to allocate
# job_name = pyseqrna          # Job name for identification
# output = slurm-%j.out        # Standard output file (%j = job ID)
# error = slurm-%j.err         # Standard error file (%j = job ID)
# mail_user = user@example.com # Email address for notifications
# mail_type = ALL              # When to send email (BEGIN, END, FAIL, ALL)
