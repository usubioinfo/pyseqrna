## Flexbar: Adapter removal and quality trimming tool
## Author: Naveen Duhan
## Version: 3.5.0
## Description: Configuration for Flexbar read preprocessing tool
##
## Flexbar is a flexible barcode and adapter removal tool for high-throughput
## sequencing data. It preprocesses FASTQ files by removing adapter sequences,
## trimming low quality bases, and filtering short reads.

[flexbar]
# Output directory will be set by the module to: pySeqRNA_results/1.Quality_and_trimming/flexbar_results/
# outdir = -t flexbar_results

# Number of threads for parallel processing
# Higher values speed up processing but use more CPU resources
threads = -n 30

# Quality threshold for trimming low-quality bases
# Bases with quality below this will be trimmed
# Higher values = more aggressive quality trimming
quality = -qt 20

# Compress output files (GZ = gzip compression)
# Reduces file size but requires decompression for some downstream tools
zip_out = -z GZ

# Additional commonly used options (uncomment to use):
# min_length = -m 30        # Minimum read length after trimming
# adapter = -a AGATCGGAAG   # Adapter sequence for removal
# max_uncalled = -u 5       # Maximum number of uncalled bases (N) allowed
# pre_trim_left = -tl 0     # Trim N bases from left side before processing
# pre_trim_right = -tr 0    # Trim N bases from right side before processing
# adapter_min_overlap = -ao 3  # Minimum overlap for adapter detection
# adapter_threshold = -at 3    # Error threshold for adapter detection
# quality_format = -q SANGER   # Quality score format (SANGER, SOLEXA, ILLUMINA)