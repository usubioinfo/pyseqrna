## Minimap2: Fast alignment tool for long reads and short reads
## Author: Naveen Duhan
## Type NA if you don't want to use any option
## Default preset is 'splice:sr' for short-read RNA-seq data - change as needed
## You can add more option from a program with <key = option value #comment>

[index]
# Index directory (created in results directory)
index_dir = minimap2_index
# Base name for index files
basename = genome
# k-mer size (no larger than 28)
kmer_size = NA
# minimizer window size
window_size = NA
# split index for every ~NUM input bases (e.g., 8G)
split_index = NA

[alignment]
# Index directory for alignment
index_dir = minimap2_index
# Reference genome basename
reference = genome
# Number of threads for alignment (handled by pipeline)
threads = 10
# Preset for alignment type (sr, splice:sr, lr:hq, map-ont, etc.)
preset = -x splice:sr
# Output in SAM format (handled by pipeline)
sam_output = -a
# Max fragment length (effective with -xsr)
max_fragment_length = -F 800
# Retain at most INT secondary alignments
secondary_alignments = -N 5
# Min secondary-to-primary score ratio
min_secondary_ratio = -p 0.8
# Matching score
match_score = -A 2
# Mismatch penalty
mismatch_penalty = -B 4
# Gap open penalty (two values: standard,long)
gap_open = -O 4,24
# Gap extension penalty (two values: standard,long)
gap_extend = -E 2,1
# Minimal peak DP alignment score
min_peak_score = -s 80
# Max intron length (for spliced alignment)
max_intron_length = -G 200000
# How to find GT-AG splice sites (f:transcript, b:both, n:don't)
splice_mode = -u n

# Additional RNA-seq specific options (uncomment to use):
# splice_junctions = -j junctions.bed  # BED12 file with known junctions
# cigar_long = -L                      # Write CIGAR with >65535 ops at CG tag
# soft_clip = -Y                       # Use soft clipping for supplementary alignments
# copy_comments = -y                   # Copy FASTA/Q comments to output SAM
# eqx_cigar = --eqx                    # Write =/X CIGAR operators
# md_tag = --MD                        # Output the MD tag
# read_group = -R "@RG\tID:sample\tSM:sample"  # SAM read group line