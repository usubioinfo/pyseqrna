# PySeqRNA Normalization Configuration
# ==================================
# Configuration file for count normalization methods in PySeqRNA
# Author: Naveen Duhan

[GENERAL]
# Default normalization method to use
# Options: cpm, rpkm, tpm, fpkm, median_ratio
method = rpkm

# Whether to create comparison plots
create_plots = True

# Output format for normalized counts
# Options: xlsx, csv, tsv
output_format = xlsx

[CPM]
# Counts per million normalization
# Simple library size normalization
scaling_factor = 1000000

[RPKM]
# Reads per kilobase per million mapped reads
# Normalizes for both library size and gene length
# Default method for most RNA-seq analyses
enable = True

[TPM]
# Transcripts per million
# Similar to RPKM but ensures sum equals 1 million in each sample
enable = True

[FPKM]
# Fragments per kilobase per million mapped reads
# Similar to RPKM but for paired-end data (fragments vs reads)
enable = True

[MEDIAN_RATIO]
# DESeq2-style median ratio normalization
# Robust normalization method that doesn't require gene length
enable = True

[PLOTTING]
# Boxplot comparison settings
figure_width = 12
figure_height = 8
dpi = 300
file_format = png

# Colors for before/after comparison
before_color = lightblue
after_color = lightcoral